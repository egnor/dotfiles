# Managed by pyinfra. Source: dotfiles/certbot/files/cli.ini

# Account/agreement defaults applied to every certbot invocation on this
# host (unless overridden on the command line or in a per-cert renewal
# config under /etc/letsencrypt/renewal/).
email = egnor@ofb.net
agree-tos = true
non-interactive = true

# Don't touch nginx config; just write certs under /etc/letsencrypt/live/.
# Per-issuance: pass `-w <docroot>` so certbot knows where to drop the
# /.well-known/acme-challenge/... files for HTTP-01 validation.
authenticator = webroot

# Modern key type (smaller, faster). Existing RSA certs aren't reissued
# automatically — pass `--key-type ecdsa --reuse-key` to migrate one.
key-type = ecdsa

# --- Package-installed defaults (preserved verbatim) ---
# Because we are using logrotate for greater flexibility, disable the
# internal certbot logrotation.
max-log-backups = 0
# Adjust interactive output regarding automated renewal
preconfigured-renewal = True
