# Managed by pyinfra. Source: dotfiles/netdata/files/child/netdata.conf
# Child node: ship metrics to the parent (egnor-2020). Alert evaluation
# is delegated to the parent so children just produce data. Ephemeral
# means disconnects don't accumulate as stale-archived "permanent" nodes
# on the parent (which would fire `streaming_never_connected`).

[global]
	is ephemeral node = yes

[health]
	enabled = no
