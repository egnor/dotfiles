# Managed by pyinfra. Source: dotfiles/netdata/files.child/go.d/smartctl.conf
# Enable netdata's SMART collector on physical hosts. It shells out to
# `smartctl` (smartmontools, installed by netdata/setup.py) through the
# setuid ndsudo helper, so no sudoers entry is needed. Devices are
# auto-discovered; virtualized hosts expose no SMART devices and the
# collector simply idles. Alerts live on the parent (files.parent/health.d/
# smartctl.conf) since children run with [health] enabled = no.

jobs:
  - name: smartctl
