# Managed by pyinfra. Source: dotfiles/netdata/files.child/go.d/filecheck.conf
# Watch the unattended-upgrades success stamp. apt.systemd.daily touches
# this file only when its timer-driven `unattended-upgrade` run exits 0, so
# its mtime is a faithful "last time automatic updates succeeded" signal --
# the one that catches u-u breaking SILENTLY (apt.systemd.daily swallows
# u-u's exit code, so apt-daily-upgrade.service reports success even when
# u-u crashes; failed-unit alerting can never see it). Alerts live on the
# parent in health.d/apt_upgrade.conf: stale mtime AND file-never-existed
# (the latter caught eacs.io running with u-u installed but never enabled).
# Non-apt hosts (FreeBSD onerouting) manage netdata config out-of-band and
# never get this file.

jobs:
  - name: apt_upgrade_stamp
    files:
      include:
        - '/var/lib/apt/periodic/upgrade-stamp'
