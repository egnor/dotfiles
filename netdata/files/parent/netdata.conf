# Managed by pyinfra. Source: dotfiles/netdata/files/parent/netdata.conf
# Parent node: long-retention TSDB, dashboard on localhost only (proxied
# via nginx), streaming socket open on the public port for child uplinks.

[web]
	bind to = 127.0.0.1:19998 *:19999=streaming

[db]
	storage tiers = 3
	dbengine tier 0 retention time = 30d
	dbengine tier 1 update every iterations = 60
	dbengine tier 1 retention time = 6mo
	dbengine tier 2 update every iterations = 60
	dbengine tier 2 retention time = 2y
