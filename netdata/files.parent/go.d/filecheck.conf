# Managed by pyinfra. Source: dotfiles/netdata/files.parent/go.d/filecheck.conf
# Watch the iap-prober's success marker. The prober (running every 5 min
# via systemd user timer in ~egnor/prod-blackletterlabs-iap) writes
# last_ok.txt on success and unlinks it on failure, so the file's
# existence and mtime together encode "last run succeeded recently."
# Alerts in health.d/iap_prober.conf fire on file-missing (immediate)
# and on stale-mtime (timer not firing at all).

jobs:
  - name: iap_prober
    files:
      include:
        - '/home/egnor/prod-blackletterlabs-iap/prober_data/last_ok.txt'
