# Managed by pyinfra. Source: dotfiles/netdata/files.parent/go.d/httpcheck.conf
# Generic HTTP endpoint checks for static sites. Stock alert templates in
# /usr/lib/netdata/conf.d/health.d/httpcheck.conf cover bad_status,
# bad_header, no_connection, timeouts; nothing custom needed here.
#
# Two flavors of job below:
#   - 200-OK checks: just GET, expect 200 (default).
#   - Redirect checks: not_follow_redirects + status_accepted=[301] +
#     header_match on Location, to verify a specific redirect target.
#     If the redirect target changes, the alert fires until the config
#     here is updated to match - that's the intended coupling.

jobs:
  # --- Drain Teaser: 200-OK static sites ---
  - name: blackletterlabs
    url: https://blackletterlabs.com
  - name: shop_seventeengames
    url: https://shop.seventeengames.com
  - name: seventeengames_scan
    url: https://seventeengames.com/scan.html

  # --- Drain Teaser: redirect rules ---
  # 17g.io/ -> shop.seventeengames.com/ (short-circuits past seventeengames.com)
  - name: redirect_17g_io_root
    url: https://17g.io/
    not_follow_redirects: yes
    status_accepted: [301]
    header_match:
      - key: Location
        value: '= https://shop.seventeengames.com/'

  # seventeengames.com/ -> shop.seventeengames.com/
  - name: redirect_seventeengames_root
    url: https://seventeengames.com/
    not_follow_redirects: yes
    status_accepted: [301]
    header_match:
      - key: Location
        value: '= https://shop.seventeengames.com/'

  # 17g.io/<id> -> seventeengames.com/scan.html?id=<id>
  - name: redirect_17g_io_scan
    url: https://17g.io/probe
    not_follow_redirects: yes
    status_accepted: [301]
    header_match:
      - key: Location
        value: '= https://seventeengames.com/scan.html?id=probe'
