# Managed by pyinfra. Source: netdata/files.parent/health_alarm_notify.conf
#
# Override of stock health_alarm_notify.conf — sourced after the stock copy
# (see alarm-notify.sh.in:519), so only deltas live here.
#
# We replace the stock ntfy sender with a custom one that uses ntfy's
# sequence_id feature (v2.16.0+) so warning -> critical -> clear
# transitions collapse into one updating notification on the device,
# rather than three separate notifications.

SEND_NTFY="NO"

SEND_CUSTOM="YES"
DEFAULT_RECIPIENT_CUSTOM="https://ntfy.sh/eacs-alerts"

# NTFY_ACCESS_TOKEN lives in an out-of-band sidecar (not in repo, see
# CLAUDE.md). Sourced last so it overrides anything above.
[ -r /etc/netdata/health_alarm_notify_secrets.conf ] \
    && source /etc/netdata/health_alarm_notify_secrets.conf

custom_sender() {
    local httpcode priority emoji recipients="${1}" sent=0 msg seq_id

    [ "${SEND_CUSTOM}" != "YES" ] && return 1
    if [ -z "${NTFY_ACCESS_TOKEN}" ]; then
        error "NTFY_ACCESS_TOKEN unset; cannot send ntfy notification."
        return 1
    fi

    case "${status}" in
        WARNING)  emoji="warning";          priority="high"    ;;
        CRITICAL) emoji="red_circle";       priority="urgent"  ;;
        CLEAR)    emoji="white_check_mark"; priority="default" ;;
        *)        emoji="white_circle";     priority="default" ;;
    esac

    # Stable per-alarm-instance sequence ID. host+chart+name survives
    # daemon restarts (alarm_id does not). Slugify to ntfy's safe charset.
    seq_id="$(printf '%s' "${host}-${chart}-${name}" | tr -c 'A-Za-z0-9_-' '_')"

    msg="${host} ${status_message}: ${alarm} - ${info}"

    for recipient in ${recipients}; do
        httpcode=$(docurl -X POST \
            -H "Authorization: Bearer ${NTFY_ACCESS_TOKEN}" \
            -H "Title: ${host}: ${name//_/ }" \
            -H "Tags: ${emoji}" \
            -H "Priority: ${priority}" \
            -H "X-Sequence-ID: ${seq_id}" \
            -H "Actions: view, View node, ${goto_url}, clear=true;" \
            -d "${msg}" \
            "${recipient}")
        if [ "${httpcode}" = "200" ]; then
            info "sent ntfy notification to '${recipient}' (seq=${seq_id}) for ${notification_description}"
            sent=$((sent + 1))
        else
            error "failed to send ntfy notification to '${recipient}', HTTP ${httpcode}"
        fi
    done

    [ ${sent} -gt 0 ] && return 0
    return 1
}
