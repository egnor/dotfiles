# Managed by pyinfra. Source: dotfiles/netdata/files.parent/health.d/iap_prober.conf
# Two alerts on the same file (last_ok.txt) for two different failure
# modes. Scoped via chart labels so this only matches the iap_prober
# filecheck job — other future filecheck jobs won't get caught.

# Prober ran and failed (it unlinks last_ok.txt on error). Instant signal.
 template: iap_prober_failed
       on: filecheck.file_existence_status
chart labels: file_path=*/prober_data/last_ok.txt
     calc: $not_exist
    units: bool
    every: 30s
     crit: $this == 1
    delay: down 1m
  summary: iap-prober failing
     info: last_ok.txt is missing — most recent prober run failed (see ~egnor/prod-blackletterlabs-iap/prober_data/last_error.txt or `journalctl --user-unit=iap-prober`)
       to: sysadmin

# Backstop for the case where the prober isn't running at all — file
# still exists but mtime is stale (timer broken, host paused, etc.).
 template: iap_prober_stale
       on: filecheck.file_modification_time_ago
chart labels: file_path=*/prober_data/last_ok.txt
     calc: $mtime_ago
    units: seconds
    every: 30s
     warn: $this > 900
     crit: $this > 1800
    delay: down 5m
  summary: iap-prober not running
     info: last_ok.txt has not been touched in ${this|seconds_to_time}; the iap-prober timer may not be firing
       to: sysadmin
