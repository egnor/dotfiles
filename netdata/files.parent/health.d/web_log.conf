# Managed by pyinfra. Source: dotfiles/netdata/files.parent/health.d/web_log.conf
# Per-template overrides for the stock web_log alerts. Defining a template
# with the same name in /etc/netdata/health.d/ replaces the stock one
# under /usr/lib/netdata/conf.d/health.d/web_log.conf.
#
# Why these are silenced: this server's nginx access log is dominated by
# bot/scanner traffic on :80 getting HTTP→HTTPS-redirected. Baseline 3xx
# is ~60% and stock thresholds (`redirects > 20%`, `successful < 95%`)
# fire on essentially every busy minute. The 5xx (`internal_errors`) and
# `unmatched` alerts in the stock file remain stock — those still carry
# real signal here.

 template: web_log_1m_successful
       on: web_log.type_requests
    class: Workload
     type: Web Server
component: Web log
   lookup: sum -1m unaligned of success
     calc: $this * 100 / $web_log_1m_requests
    units: %
    every: 10s
     warn: ($web_log_1m_requests > 120) ? ($this < (($status >= $WARNING ) ? ( 95 ) : ( 85 )) ) : ( 0 )
     crit: ($web_log_1m_requests > 120) ? ($this < (($status == $CRITICAL) ? ( 85 ) : ( 75 )) ) : ( 0 )
    delay: up 2m down 15m multiplier 1.5 max 1h
  summary: Web log successful
     info: Ratio of successful HTTP requests over the last minute (1xx, 2xx, 304, 401, 429)
       to: silent

 template: web_log_1m_redirects
       on: web_log.type_requests
    class: Workload
     type: Web Server
component: Web log
   lookup: sum -1m unaligned of redirect
     calc: $this * 100 / $web_log_1m_requests
    units: %
    every: 10s
     warn: ($web_log_1m_requests > 120) ? ($this > (($status >= $WARNING ) ? (  1 ) : ( 20 )) ) : ( 0 )
    delay: up 2m down 15m multiplier 1.5 max 1h
  summary: Web log redirects
     info: Ratio of redirection HTTP requests over the last minute (3xx except 304)
       to: silent

 template: web_log_1m_bad_requests
       on: web_log.type_requests
    class: Errors
     type: Web Server
component: Web log
   lookup: sum -1m unaligned of bad
     calc: $this * 100 / $web_log_1m_requests
    units: %
    every: 10s
     warn: ($web_log_1m_requests > 120) ? ($this > (($status >= $WARNING)  ? ( 10 ) : ( 30 )) ) : ( 0 )
    delay: up 2m down 15m multiplier 1.5 max 1h
  summary: Web log bad requests
     info: Ratio of client error HTTP requests over the last minute (4xx except 401 and 429)
       to: silent
