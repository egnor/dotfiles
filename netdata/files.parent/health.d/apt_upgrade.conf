# Managed by pyinfra. Source: dotfiles/netdata/files.parent/health.d/apt_upgrade.conf
# Dead-man's-switch on automatic security updates, fleet-wide. The filecheck
# job (go.d/filecheck.conf, on parent and children alike) watches
# /var/lib/apt/periodic/upgrade-stamp, which apt.systemd.daily touches only
# when its unattended-upgrade invocation exits 0. Monitoring "succeeded
# recently" instead of "visibly failed" matters here because u-u's failures
# are structurally silent: apt.systemd.daily swallows u-u's exit code, so
# apt-daily-upgrade.service shows success even when u-u crashes on startup
# (as it did fleet-wide for 3 weeks in Jun-Jul 2026 from a malformed
# Allowed-Origins entry). Scoped via chart labels to the upgrade-stamp
# filecheck job only, like iap_prober.conf.

# Stamp exists but is stale: u-u is enabled but hasn't succeeded lately.
# It runs daily, so >2 days means at least two consecutive misses.
# Diagnose with /var/log/unattended-upgrades/unattended-upgrades.log and
# `journalctl -u apt-daily-upgrade.service` on the named host.
 template: apt_upgrade_stale
       on: filecheck.file_modification_time_ago
chart labels: file_path=*/apt/periodic/upgrade-stamp
     calc: $mtime_ago
    units: seconds
    every: 1m
     warn: $this > 172800
     crit: $this > 345600
    delay: down 15m
  summary: unattended-upgrades not succeeding
     info: upgrade-stamp untouched for ${this|seconds_to_time} - unattended-upgrades has not completed successfully (its own unit reports success even when it crashes; check the u-u log on the host)
       to: sysadmin

# Stamp doesn't exist at all: u-u has NEVER succeeded on this host --
# usually meaning APT::Periodic::Unattended-Upgrade was never set (the
# package ships inert; tweaks/files/apt-auto-upgrades enables it). This is
# exactly how eacs.io ran exposed with no automatic security updates.
# Clears on the first successful nightly run after enabling.
 template: apt_upgrade_never_ran
       on: filecheck.file_existence_status
chart labels: file_path=*/apt/periodic/upgrade-stamp
     calc: $not_exist
    units: bool
    every: 1m
     warn: $this == 1
    delay: down 15m
  summary: unattended-upgrades never succeeded
     info: /var/lib/apt/periodic/upgrade-stamp does not exist - unattended-upgrades has never completed on this host (likely APT::Periodic::Unattended-Upgrade unset; deploy the dotfiles tweaks)
       to: sysadmin
