# Managed by pyinfra. Source: dotfiles/netdata/files.parent/health.d/systemdunits.conf
# Alert on any systemd service unit in the "failed" state, fleet-wide.
#
# Netdata SHIPS this template but with `chart labels: unit_name=!*` -- a
# match-nothing selector, i.e. deliberately disabled out of the box (stock
# health only alerts on charts a collector exposes, and even this generic
# one is opt-in). A same-named file in /etc/netdata/health.d replaces the
# whole stock health.d/systemdunits.conf, so this copy with `unit_name=*`
# is the enablement. The stock file's other stanzas (socket/target/path/
# mount/etc unit types) are equally disabled upstream and intentionally not
# reproduced here -- service units are where the signal is; add other unit
# types later if wanted.
#
# Children stream their systemd.service_unit_state charts here and this
# parent evaluates the template across the whole fleet (children run with
# [health] enabled = no). Caveat learned the hard way: a periodic job that
# swallows its payload's exit code (apt.systemd.daily around
# unattended-upgrade) never enters failed state and is invisible to this
# alert -- that case is covered by health.d/apt_upgrade.conf's stamp-
# freshness check instead.

    template: systemd_service_unit_failed_state
          on: systemd.service_unit_state
       class: Errors
        type: Linux
   component: Systemd units
chart labels: unit_name=*
        calc: $failed
       units: state
       every: 10s
        warn: $this != nan AND $this == 1
       delay: down 5m multiplier 1.5 max 1h
     summary: systemd unit ${label:unit_name} failed
        info: systemd service unit ${label:unit_name} is in the failed state
          to: sysadmin
