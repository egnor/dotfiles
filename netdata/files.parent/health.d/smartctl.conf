# Managed by pyinfra. Source: dotfiles/netdata/files.parent/health.d/smartctl.conf
# SMART disk-health alarms. The smartctl collector runs on each physical
# host; children stream their charts here and this parent evaluates all
# alerts (children run with [health] enabled = no). Virtualized hosts
# expose no SMART devices, so none of these templates instantiate there.
#
# Each per-attribute template only attaches to drives that actually expose
# that attribute, so listing several (including ones the current fleet's
# drives don't report, like current_pending_sector) is safe — they no-op
# where the chart is absent, and light up automatically on future hardware
# that does report them.
#
# Design: the overall self-assessment flipping to FAILED is the one hard
# CRITICAL. The rest are "should always be zero" media-health counters
# (the exact attributes whose silent corruption took skully's root fs
# read-only in Jun 2026) raised as WARNINGs on any nonzero value, since
# the first reallocated/uncorrectable sector is the early warning a healthy
# SMART summary won't show.

# --- overall self-assessment: FAILED means failure predicted ------------
   template: smartctl_device_smart_status
         on: smartctl.device_smart_status
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned of failed
      units: status
      every: 1m
       crit: $this != 0
      delay: down 15m multiplier 1.5 max 1h
    summary: SMART FAILED on ${label:device_name}
       info: SMART overall-health self-assessment is FAILED on ${label:device_name} (${label:model_name}) - drive failure predicted, back up and replace
         to: sysadmin

# --- reallocated sectors: should be 0 -----------------------------------
   template: smartctl_device_reallocated_sectors
         on: smartctl.device_smart_attr_reallocated_sector_ct
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: sectors
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Reallocated sectors on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) has reallocated ${value} sector(s) - media wearing; watch the trend and plan replacement
         to: sysadmin

# --- pending sectors: should be 0 (not reported by all drives) ----------
   template: smartctl_device_pending_sectors
         on: smartctl.device_smart_attr_current_pending_sector
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: sectors
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Pending sectors on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) has ${value} sector(s) pending reallocation - unreadable blocks awaiting remap
         to: sysadmin

# --- offline uncorrectable: should be 0 (not reported by all drives) -----
   template: smartctl_device_offline_uncorrectable
         on: smartctl.device_smart_attr_offline_uncorrectable
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: sectors
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Uncorrectable sectors on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) reports ${value} offline-uncorrectable sector(s) - unrecoverable read errors
         to: sysadmin

# --- reported uncorrectable errors: should be 0 -------------------------
   template: smartctl_device_uncorrectable_errors
         on: smartctl.device_smart_attr_uncorrectable_error_cnt
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: errors
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Uncorrectable errors on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) reports ${value} uncorrectable error(s)
         to: sysadmin

# --- runtime bad blocks: should be 0 ------------------------------------
   template: smartctl_device_runtime_bad_block
         on: smartctl.device_smart_attr_runtime_bad_block
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: blocks
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Runtime bad blocks on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) reports ${value} runtime bad block(s)
         to: sysadmin

# --- reserved blocks consumed: should be 0 ------------------------------
   template: smartctl_device_used_reserved_blocks
         on: smartctl.device_smart_attr_used_rsvd_blk_cnt_tot
      class: Errors
       type: System
  component: Disk
     lookup: max -1m unaligned
      units: blocks
      every: 1m
       warn: $this > 0
      delay: down 1h
    summary: Reserved blocks consumed on ${label:device_name}
       info: ${label:device_name} (${label:model_name}) has consumed ${value} spare block(s) from its reserve pool
         to: sysadmin
