# Managed by pyinfra. Source: dns/files/resolved-no-stub.conf
# systemd-resolved drop-in: disable the local DNS stub listener (127.0.0.53,
# 127.0.0.54) so the Knot authoritative server on this host can bind
# 0.0.0.0:53 and [::]:53 without conflict. resolved itself stays running so
# it continues tracking upstream DNS from DHCP and writing the upstream list
# to /run/systemd/resolve/resolv.conf (which /etc/resolv.conf points at).

[Resolve]
DNSStubListener=no
