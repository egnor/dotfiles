# Managed by pyinfra. Source: opendkim/files/opendkim.conf
# DKIM signing + verification milter for postfix.
# Reference: man opendkim.conf  /  /usr/share/doc/opendkim/examples/

# Logging
Syslog              yes
SyslogSuccess       yes

# Signing/verification behaviour
Canonicalization    relaxed/simple
Mode                sv
OversignHeaders     From

# Multi-domain config: signing table picks key per sender; key table
# resolves selector + private key path.
SigningTable        refile:/etc/dkimkeys/signing.table
KeyTable            /etc/dkimkeys/key.table
InternalHosts       /etc/dkimkeys/trusted.hosts
ExternalIgnoreList  /etc/dkimkeys/trusted.hosts

# Process identity. UMask 007 lets the postfix-group MTA read the socket.
UserID              opendkim
UMask               007

# Socket inside postfix chroot so postfix can reach it without escaping.
Socket              local:/var/spool/postfix/opendkim/opendkim.sock
PidFile             /run/opendkim/opendkim.pid

# DNSSEC trust anchor ships in dns-root-data on Debian/Ubuntu.
TrustAnchorFile     /usr/share/dns/root.key
