// Managed by pyinfra. Source: tweaks/files/mozilla-unattended-upgrades.conf
// apt's preferences.d pin makes interactive `apt install firefox` pull from
// packages.mozilla.org. unattended-upgrades has its OWN origin allowlist that
// apt pin priority does not affect, so the mozilla origin must be added here
// too -- both so security updates come through AND so u-u doesn't slam the
// mozilla origin with its magic -32768 "never" pin.
//
// CRITICAL x2:
//   - This must go in Origins-Pattern, NOT Allowed-Origins. Allowed-Origins is
//     the legacy list whose entries u-u parses strictly as "id:codename" (or
//     "id codename"); a key=value entry there has no separator and crashes the
//     parser, which aborts EVERY u-u run (no updates at all). Origins-Pattern
//     entries are taken verbatim with full tag matching.
//   - Match by site=, not o=. Mozilla's Release "Origin:" field is an
//     autogenerated string ("namespaces/moz-fx-productdelivery-pr-.../mozilla"),
//     NOT its hostname, so an o=/host:suite match never fires; u-u then treats
//     mozilla as disallowed, pins it -32768, and the only firefox left standing
//     is Ubuntu's snap-transitional deb -- which is how u-u kept reinstalling
//     the snap on every run. site= (the hostname) sidesteps the garbage Origin
//     field. Verify with: unattended-upgrade --dry-run --debug | grep mozilla
Unattended-Upgrade::Origins-Pattern:: "site=packages.mozilla.org,a=mozilla";
