// Managed by pyinfra. Source: tweaks/files/mozilla-unattended-upgrades.conf
// apt's preferences.d pin makes interactive `apt install firefox` pull from
// packages.mozilla.org. unattended-upgrades has its OWN origin allowlist (in
// 50unattended-upgrades) that apt pin priority does not affect, so the mozilla
// origin must be added here too -- both so security updates come through AND so
// u-u doesn't slam the mozilla origin with its magic -32768 "never" pin.
//
// CRITICAL: match by site=, not the bare "host:suite" shorthand. u-u expands
// "packages.mozilla.org:mozilla" to o=packages.mozilla.org,a=mozilla -- i.e. it
// matches the repo's Release "Origin:" FIELD. But Mozilla's Origin field is an
// autogenerated string ("namespaces/moz-fx-productdelivery-pr-.../mozilla"),
// NOT its hostname, so that entry never matched. u-u then treated mozilla as a
// disallowed origin, pinned it to -32768, and the only firefox left standing
// was Ubuntu's snap-transitional deb -- which is why u-u kept reinstalling the
// snap on every run. Matching site= (the hostname) sidesteps the garbage
// Origin field. Verify with: unattended-upgrade --dry-run --debug | grep mozilla
Unattended-Upgrade::Allowed-Origins:: "site=packages.mozilla.org,a=mozilla";
