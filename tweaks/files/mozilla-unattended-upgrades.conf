// Managed by pyinfra. Source: tweaks/files/mozilla-unattended-upgrades.conf
// apt's preferences.d pin makes interactive `apt install firefox` pull from
// packages.mozilla.org. unattended-upgrades has its own origin allowlist
// (in 50unattended-upgrades) that apt pin priority does not affect, so the
// mozilla origin has to be added here for security updates to come through.
Unattended-Upgrade::Allowed-Origins:: "packages.mozilla.org:mozilla";
