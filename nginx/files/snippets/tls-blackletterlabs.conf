# Managed by pyinfra. Source: dotfiles/nginx/files/snippets/tls-blackletterlabs.conf
# Shared TLS + ACME boilerplate for the Black Letter Labs cert. Include this
# inside a `server {}` (it pulls in the acme-challenge location, which is only
# valid in server context).
listen [::]:443 ssl;
listen 443 ssl;
include /etc/nginx/snippets/acme-challenge.conf;
ssl_certificate /etc/letsencrypt/live/blackletterlabs.com-0001/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/blackletterlabs.com-0001/privkey.pem;
