# Managed by pyinfra. Source: dotfiles/nginx/files/snippets/tls-0b10001.conf
# Shared TLS + ACME boilerplate for the 0b10001.com cert (covers the
# seventeengames.com / 0b10001.com / 17g.io family). Include this inside a
# `server {}` (it pulls in the acme-challenge location).
listen [::]:443 ssl;
listen 443 ssl;
include /etc/nginx/snippets/acme-challenge.conf;
ssl_certificate /etc/letsencrypt/live/0b10001.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/0b10001.com/privkey.pem;
