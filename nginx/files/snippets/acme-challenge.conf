# Managed by pyinfra. Source: dotfiles/nginx/files/snippets/acme-challenge.conf
# Serve LE HTTP-01 challenges from a shared webroot. `^~` makes this prefix
# match win over any regex `location ~` blocks in the same server, so it's
# safe to drop into servers that have other catch-all routing.
location ^~ /.well-known/acme-challenge/ {
    auth_basic off;  # override any server-level auth_basic (e.g. czar*)
    root /var/www/letsencrypt;
    default_type "text/plain";
}
