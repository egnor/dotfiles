# Managed by pyinfra. Source: postfix/files/sasl/smtpd.conf
# Cyrus-SASL plugin config used by smtpd. auxprop+sasldb means passwords
# are stored in /var/spool/postfix/etc/sasldb2 (postfix chroot location).
# CRAM-MD5 / DIGEST-MD5 require plaintext-equivalent storage server-side,
# so the DB itself is sensitive — kept out of the repo.
pwcheck_method: auxprop
auxprop_plugin: sasldb
mech_list: PLAIN LOGIN CRAM-MD5 DIGEST-MD5 NTLM
